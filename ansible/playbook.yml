---
# ── Post-Deployment Ansible Playbook ──────────────────────────────
# Runs after Terraform deploys VMs from the Fedora COSMIC Atomic template.
# Installs extra packages and performs post-deployment configuration.
#
# Since Fedora Atomic uses rpm-ostree, packages are layered and require
# a reboot to take effect.

- name: Post-deployment configuration for Fedora COSMIC Atomic VMs
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for system to become reachable via SSH
      wait_for_connection:
        timeout: 180

    - name: Gather facts
      setup:

  vars:
    # Extra packages to install via rpm-ostree
    # (these mirror dev tools from the Docker dev container)
    extra_packages:
      - git
      - vim
      - curl
      - wget
      - jq
      - python3
      - python3-pip
      - htop
      - tmux
      - bash-completion

  tasks:
    # ── Wait for cloud-init to finish ──────────────────────────────
    - name: Wait for cloud-init to complete
      shell: cloud-init status --wait || cloud-init status --long || true
      changed_when: false
      timeout: 300

    # ── Install extra packages via rpm-ostree ──────────────────────
    - name: Check which packages are already layered
      command: rpm-ostree status --json
      register: ostree_status
      changed_when: false

    - name: Check which optional packages are currently installed
      command: "rpm -q {{ item }}"
      loop: "{{ extra_packages }}"
      register: extra_package_checks_before
      changed_when: false
      failed_when: false

    - name: Build list of optional packages still missing
      set_fact:
        missing_extra_packages_before: "{{ extra_package_checks_before.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"

    - name: Report package layering baseline
      debug:
        msg: "Optional packages missing before install attempt: {{ missing_extra_packages_before | join(', ') }}"
      when: missing_extra_packages_before | length > 0

    - name: Report package layering baseline (all present)
      debug:
        msg: "All optional packages are already present in the template deployment."
      when: missing_extra_packages_before | length == 0

    - name: Set default install result when no packages are missing
      set_fact:
        rpm_ostree_install:
          rc: 0
          changed: false
          stdout: ""
          stderr: ""
      when: missing_extra_packages_before | length == 0

    - name: Refresh rpm-ostree metadata (best effort)
      command: rpm-ostree refresh-md
      register: rpm_ostree_refresh
      changed_when: false
      failed_when: false
      retries: 3
      delay: 20
      until: rpm_ostree_refresh.rc == 0
      when: missing_extra_packages_before | length > 0

    - name: Install extra packages via rpm-ostree (with retries)
      command: >
        rpm-ostree install --idempotent --allow-inactive
        {{ missing_extra_packages_before | join(' ') }}
      register: rpm_ostree_install
      retries: 4
      delay: 45
      until: rpm_ostree_install.rc == 0
      failed_when: false
      changed_when: rpm_ostree_install.rc == 0 and ('Installing:' in rpm_ostree_install.stdout or 'Staging deployment' in rpm_ostree_install.stdout)
      when: missing_extra_packages_before | length > 0

    - name: Warn if extra package layering could not complete
      debug:
        msg: |
          WARNING: rpm-ostree package layering did not complete after retries.
          Deployment will continue, but some optional tools may be missing.
          Last error: {{ rpm_ostree_install.stderr | default('n/a') }}
      when: rpm_ostree_install.rc != 0

    - name: Check optional packages after install attempt
      command: "rpm -q {{ item }}"
      loop: "{{ extra_packages }}"
      register: extra_package_checks_after
      changed_when: false
      failed_when: false

    - name: Build list of optional packages still missing after install attempt
      set_fact:
        missing_extra_packages_after: "{{ extra_package_checks_after.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"

    - name: Report optional packages still missing
      debug:
        msg: "Optional packages still missing after install attempt: {{ missing_extra_packages_after | join(', ') }}"
      when: missing_extra_packages_after | length > 0

    - name: Report optional package verification success
      debug:
        msg: "Optional package verification complete: all requested tools are available."
      when: missing_extra_packages_after | length == 0

    # ── Reboot if rpm-ostree made changes ──────────────────────────
    - name: Reboot to apply rpm-ostree changes
      reboot:
        reboot_timeout: 300
        msg: "Rebooting to apply rpm-ostree package layering"
      when: rpm_ostree_install.changed

    - name: Wait for system to come back after reboot
      wait_for_connection:
        timeout: 300
      when: rpm_ostree_install.changed

    # ── Ensure QEMU Guest Agent is running ─────────────────────────
    - name: Ensure qemu-guest-agent is enabled and running
      systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    # ── Verify deployment ──────────────────────────────────────────
    - name: Gather system info
      setup:
        filter: "ansible_*"

    - name: Display deployment summary
      debug:
        msg: |
          ✓ VM Deployment Complete
            Hostname:  {{ ansible_hostname }}
            OS:        {{ ansible_distribution }} {{ ansible_distribution_version }}
            IP:        {{ ansible_default_ipv4.address | default('N/A') }}
            CPU:       {{ ansible_processor_vcpus }} vCPUs
            Memory:    {{ (ansible_memtotal_mb / 1024) | round(1) }} GB
            Disk:      {{ (ansible_devices.sda.size | default('N/A')) }}
