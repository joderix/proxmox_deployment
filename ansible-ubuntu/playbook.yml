---
# ── Post-Deployment Ansible Playbook (Ubuntu) ─────────────────────
# Runs after Terraform deploys VMs from the Ubuntu template.

- name: Post-deployment configuration for Ubuntu Server VMs
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for system to become reachable via SSH
      wait_for_connection:
        timeout: 180

    - name: Gather facts
      setup:

  vars:
    # Extra packages to install via apt
    extra_packages:
      - git
      - vim
      - curl
      - wget
      - jq
      - python3
      - python3-pip
      - qemu-guest-agent
      - htop
      - tmux
      - bash-completion

  tasks:
    # ── Wait for cloud-init to finish ─────────────────────────────
    - name: Wait for cloud-init to complete
      shell: cloud-init status --wait || cloud-init status --long || true
      changed_when: false
      timeout: 300

    # ── Install packages via apt ───────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install extra packages
      apt:
        name: "{{ extra_packages }}"
        state: present

    # ── Ensure QEMU Guest Agent is running ─────────────────────────
    - name: Ensure qemu-guest-agent is enabled and running
      systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    # ── Verify deployment ──────────────────────────────────────────
    - name: Gather system info
      setup:
        filter: "ansible_*"

    - name: Display deployment summary
      debug:
        msg: |
          ✓ VM Deployment Complete
            Hostname:  {{ ansible_hostname }}
            OS:        {{ ansible_distribution }} {{ ansible_distribution_version }}
            IP:        {{ ansible_default_ipv4.address | default('N/A') }}
            CPU:       {{ ansible_processor_vcpus }} vCPUs
            Memory:    {{ (ansible_memtotal_mb / 1024) | round(1) }} GB
            Disk:      {{ (ansible_devices.sda.size | default('N/A')) }}
