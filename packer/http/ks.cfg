# ── Fedora COSMIC Atomic 43 - Automated Kickstart ─────────────────
# This kickstart automates the installation of Fedora COSMIC Atomic
# for use as a Proxmox VM template with cloud-init.

# Installation mode
text
eula --agreed

# Locale and keyboard
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Root account (locked - use ansible user instead)
rootpw --lock

# User account for Packer SSH and Ansible
user --name=ansible --password=simplylovely --plaintext --groups=wheel

# Network configuration (DHCP during installation)
network --bootproto=dhcp --device=link --activate --onboot=on --hostname=fedora-cosmic-template

# Disk partitioning (UEFI-compatible)
zerombr
clearpart --all --initlabel --disklabel=gpt

# UEFI requires an EFI System Partition
part /boot/efi --fstype=efi --size=600 --ondisk=sda
part /boot --fstype=ext4 --size=1024 --ondisk=sda
part / --fstype=ext4 --size=1 --grow --ondisk=sda

# OSTree setup - Fedora COSMIC Atomic from the ISO
ostreesetup --osname=fedora --url=file:///ostree/repo --ref=fedora/43/x86_64/cosmic-atomic --nogpg

# Reboot after installation
reboot

# ── Post-installation script ──────────────────────────────────────
%post --log=/root/ks-post.log

# Enable passwordless sudo for wheel group (needed by Ansible and Packer)
echo "%wheel ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/99-wheel-nopasswd
chmod 440 /etc/sudoers.d/99-wheel-nopasswd

# Ensure SSH is enabled
systemctl enable sshd

# Create .ssh directory for ansible user
mkdir -p /home/ansible/.ssh
chmod 700 /home/ansible/.ssh
chown ansible:ansible /home/ansible/.ssh

%end
